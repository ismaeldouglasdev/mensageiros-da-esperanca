<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="app.title">Inscrições - Mensageiros da Esperança</title>
  <link rel="stylesheet" href="style.css?v=1.1">
  <style>
    .lang-switcher {
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 6px;
      padding: 0.25rem 0.5rem;
      font-size: 0.7rem;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: 0.5px;
      transition: all 0.2s;
      line-height: 1.4;
    }
    .lang-switcher:hover {
      background: rgba(255,255,255,0.3);
      border-color: #fff;
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
  <script src="i18n.js"></script>
  <script src="firebase.config.js?v=1.1"></script>
  <script src="firebase.js?v=1.1"></script>
  <script>protegerRota();</script>
</head>
<body>

  <header class="header">
    <div class="header-logo">
      <img src="logo.jpg" alt="Logo" onerror="this.src='https://via.placeholder.com/40/2E7D32/FFFFFF?text=ME'">
      <h1 data-i18n="app.name">Mensageiros da Esperança</h1>
    </div>
    <div style="display: flex; gap: 0.5rem; align-items: center;">
      <nav class="header-nav" id="navMenu">
        <a href="dashboard.html"><span data-i18n="nav.dashboard">Dashboard</span></a>
        <a href="cursos.html"><span data-i18n="nav.cursos">Cursos</span></a>
        <a href="inscricoes.html" class="ativo"><span data-i18n="nav.inscricoes">Inscrições</span></a>
        <a href="presenca.html"><span data-i18n="nav.presenca">Presença</span></a>
      </nav>
      <button class="lang-switcher" onclick="toggleLang()" title="Switch language" data-i18n-lang="lang.switch">PT</button>
      <button class="btn btn-sm" id="btnLogout" style="background: rgba(255,255,255,0.15); color: #fff;" data-i18n-title="nav.sair">
        <i data-lucide="log-out"></i>
      </button>
      <button class="menu-toggle" id="menuToggle" data-i18n-aria-label="nav.menu_abrir">
        <span>☰</span>
      </button>
    </div>
  </header>

  <main class="container">
    <h2 class="page-title"><i data-lucide="user-plus"></i> <span data-i18n="inscricoes.title">Inscrições de Participantes</span></h2>

    <div class="form-card">
      <h2 data-i18n="inscricoes.form.title">Nova Inscrição</h2>
      <form id="formInscricao">
        <div class="form-group">
          <label for="nome" data-i18n="inscricoes.form.nome_label">Nome Completo</label>
          <input type="text" id="nome" required data-i18n-placeholder="inscricoes.form.nome_placeholder" placeholder="Digite o nome completo">
        </div>
        <div class="form-group">
          <label for="contato" data-i18n="inscricoes.form.contato_label">Contato (Telefone ou E-mail)</label>
          <input type="text" id="contato" required data-i18n-placeholder="inscricoes.form.contato_placeholder" placeholder="(00) 00000-0000 ou email@exemplo.com">
        </div>
        <div class="form-group">
          <label data-i18n="inscricoes.form.cursos_label">Cursos (Selecione um ou mais)</label>
          <div id="listaCursosCheck" style="max-height: 150px; overflow-y: auto; border: 2px solid var(--border); border-radius: var(--radius-sm); padding: 0.5rem; background: #fff;">
            <!-- Checkboxes serão inseridos aqui -->
          </div>
          <small id="vagasInfo" style="display:none;margin-top:0.3rem;font-size:0.8rem;color:var(--text-light);"></small>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="btnSubmit"><span data-i18n="inscricoes.form.btn_inscrever">Realizar Inscrição</span></button>
      </form>
    </div>

    <div class="form-card">
      <h2><i data-lucide="filter"></i> <span data-i18n="inscricoes.filtro.title">Filtro</span></h2>
      <div class="form-row">
        <div class="form-group" style="flex: 1;">
          <label for="filtroCurso" data-i18n="inscricoes.filtro.label">Visualizar Participantes por Curso</label>
          <select id="filtroCurso">
            <option value="" data-i18n="inscricoes.filtro.todos">Todos os cursos</option>
          </select>
        </div>
        <div class="form-group" style="display: flex; flex-direction: column; justify-content: flex-end;">
          <label style="visibility: hidden;">&nbsp;</label>
          <button class="btn btn-secondary" onclick="exportarExcel()" id="btnExportar" data-i18n-title="inscricoes.filtro.exportar_tooltip">
            <i data-lucide="file-spreadsheet"></i> <span data-i18n="inscricoes.filtro.btn_exportar">Exportar Excel</span>
          </button>
        </div>
      </div>
    </div>

    <div class="table-container">
      <div id="batchActions" style="display:none; padding: 1rem; background: #fff3e0; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 1rem;">
        <span id="batchCount" style="font-weight: 600; color: var(--primary-dark);"></span>
        <button class="btn btn-danger btn-sm" id="btnDeleteBatch">
          <i data-lucide="trash-2"></i> <span data-i18n="inscricoes.batch.excluir_selecionados">Excluir Selecionados</span>
        </button>
      </div>
      <table>
        <thead>
          <tr>
            <th style="width: 40px;"><input type="checkbox" id="selecionarTodos" title="Selecionar todos" style="width: 18px; height: 18px; cursor: pointer;"></th>
            <th data-i18n="inscricoes.table.nome">Nome</th>
            <th data-i18n="inscricoes.table.contato">Contato</th>
            <th data-i18n="inscricoes.table.curso">Curso</th>
            <th data-i18n="inscricoes.table.data">Data de Inscrição</th>
            <th data-i18n="inscricoes.table.acoes">Ações</th>
          </tr>
        </thead>
        <tbody id="tabelaParticipantes">
          <tr>
            <td colspan="6" class="loading">
              <div class="spinner"></div>
              <p data-i18n="inscricoes.loading">Carregando participantes...</p>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div id="emptyState" class="empty-state" style="display:none;">
      <i data-lucide="users-2" class="icon"></i>
      <p data-i18n="inscricoes.empty">Nenhum participante encontrado para este curso.</p>
    </div>

  </main>

  <!-- Modal de Edição -->
  <div id="modalEdicao" class="modal" style="display:none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); align-items: center; justify-content: center;">
    <div class="modal-content" style="background-color: #fff; padding: 2rem; border-radius: var(--radius); width: 90%; max-width: 500px; box-shadow: var(--shadow);">
      <h2 style="margin-bottom: 1.5rem; color: var(--primary-dark); display: flex; align-items: center; gap: 0.5rem;">
        <i data-lucide="edit-3"></i> <span data-i18n="inscricoes.modal.title">Editar Participante</span>
      </h2>
      <form id="formEdicao">
        <input type="hidden" id="editParticipanteId">
        <div class="form-group">
          <label for="editNome" data-i18n="inscricoes.modal.nome_label">Nome Completo</label>
          <input type="text" id="editNome" required>
        </div>
        <div class="form-group">
          <label for="editContato" data-i18n="inscricoes.modal.contato_label">Contato</label>
          <input type="text" id="editContato" required>
        </div>
        <div class="form-group">
          <label for="editCursoSelect" data-i18n="inscricoes.modal.curso_label">Curso</label>
          <select id="editCursoSelect" required></select>
        </div>
        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
          <button type="submit" class="btn btn-primary btn-block" id="btnSalvarEdicao"><span data-i18n="inscricoes.modal.btn_salvar">Salvar Alterações</span></button>
          <button type="button" class="btn btn-secondary btn-block" onclick="fecharModal()"><span data-i18n="inscricoes.modal.btn_cancelar">Cancelar</span></button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast" style="display:none;"></div>

  <script>
    let cursosCache = [];
    let participantesCache = [];

    // Translate placeholders
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      el.placeholder = t(el.getAttribute('data-i18n-placeholder'));
    });

    const btnLogout = document.getElementById('btnLogout');
    btnLogout?.addEventListener('click', async () => {
      if (confirm(t('dashboard.confirm_sair'))) {
        await authAPI.logout();
        window.location.href = 'login.html';
      }
    });

    function mostrarToast(msg, tipo = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = 'toast toast-' + tipo;
      toast.style.display = 'block';
      setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }

    async function carregarCursos() {
      try {
        cursosCache = await cursosAPI.listar();
        const listaCheck = document.getElementById('listaCursosCheck');
        const filtroCurso = document.getElementById('filtroCurso');

        let htmlCheck = '';
        let opcoesFiltro = '<option value="">' + t('inscricoes.filtro.todos') + '</option>';

        cursosCache.forEach(c => {
          const label = c.nome + ' - ' + formatarDataBR(c.data);
          htmlCheck += `
            <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.25rem;">
              <input type="checkbox" name="curso" value="${c.id}" id="c_${c.id}" style="width: 16px; height: 16px;">
              <label for="c_${c.id}" style="font-weight: normal; margin-bottom: 0; cursor: pointer;">${label}</label>
            </div>
          `;
          opcoesFiltro += '<option value="' + c.id + '">' + c.nome + '</option>';
        });

        listaCheck.innerHTML = htmlCheck || '<p style="font-size: 0.8rem; color: var(--text-light);">' + t('inscricoes.form.cursos_empty') + '</p>';
        filtroCurso.innerHTML = opcoesFiltro;
      } catch (e) {
        mostrarToast(t('inscricoes.erro_carregar') + ': ' + e.message, 'error');
      }
    }

    async function carregarParticipantes(cursoId = null) {
      const tbody = document.getElementById('tabelaParticipantes');
      const emptyState = document.getElementById('emptyState');

      tbody.innerHTML = '<tr><td colspan="6" class="loading"><div class="spinner"></div><p>' + t('inscricoes.loading') + '</p></td></tr>';
      emptyState.style.display = 'none';

      try {
        participantesCache = await participantesAPI.listar(cursoId);

        if (participantesCache.length === 0) {
          tbody.innerHTML = '';
          emptyState.style.display = 'block';
          lucide.createIcons();
          return;
        }

        let html = '';
        participantesCache.forEach(p => {
          const curso = cursosCache.find(c => c.id === p.cursoId);
          const cursoNome = curso ? curso.nome : '-';
          html += '<tr>';
          html += '<td><input type="checkbox" class="participante-checkbox" data-id="' + p.id + '" style="width: 18px; height: 18px; cursor: pointer;"></td>';
          html += '<td>' + p.nome + '</td>';
          html += '<td>' + p.contato + '</td>';
          html += '<td><span class="badge badge-primary">' + cursoNome + '</span></td>';
          html += '<td>' + formatarDataBR(p.dataInscricao) + '</td>';
          html += '<td>';
          html += '<div style="display: flex; gap: 0.5rem;">';
          html += '<button class="btn btn-secondary btn-sm" onclick="abrirEdicao(\'' + p.id + '\')" title="' + t('common.editar') + '"><i data-lucide="edit-3"></i></button>';
          html += '<button class="btn btn-danger btn-sm" onclick="removerParticipante(\'' + p.id + '\')" title="' + t('common.excluir') + '"><i data-lucide="trash-2"></i></button>';
          html += '</div>';
          html += '</td>';
          html += '</tr>';
        });

        tbody.innerHTML = html;
        lucide.createIcons();
        atualizarUISelecao();
      } catch (e) {
        tbody.innerHTML = '<tr><td colspan="6" class="loading">' + t('inscricoes.erro_carregar') + '</td></tr>';
        mostrarToast(t('inscricoes.erro_carregar') + ': ' + e.message, 'error');
      }
    }

    async function abrirEdicao(id) {
      try {
        const p = await participantesAPI.obter(id);
        if (!p) return;

        document.getElementById('editParticipanteId').value = id;
        document.getElementById('editNome').value = p.nome;
        document.getElementById('editContato').value = p.contato;
        
        let selectHtml = '<option value="">' + t('inscricoes.modal.curso_placeholder') + '</option>';
        cursosCache.forEach(c => {
          selectHtml += `<option value="${c.id}">${c.nome}</option>`;
        });
        
        const select = document.getElementById('editCursoSelect');
        select.innerHTML = selectHtml;
        select.value = p.cursoId;

        document.getElementById('modalEdicao').style.display = 'flex';
        lucide.createIcons();
      } catch (e) {
        mostrarToast(t('inscricoes.erro_carregar') + ': ' + e.message, 'error');
      }
    }

    function fecharModal() {
      document.getElementById('modalEdicao').style.display = 'none';
    }

    document.getElementById('formEdicao').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('editParticipanteId').value;
      const nome = document.getElementById('editNome').value.trim();
      const contato = document.getElementById('editContato').value.trim();
      const cursoId = document.getElementById('editCursoSelect').value;

      const btn = document.getElementById('btnSalvarEdicao');
      btn.disabled = true;
      btn.textContent = t('inscricoes.modal.salvando');

      try {
        await participantesAPI.atualizar(id, { nome, contato, cursoId });
        mostrarToast(t('inscricoes.sucesso_atualizar'));
        fecharModal();
        const filtroCurso = document.getElementById('filtroCurso');
        carregarParticipantes(filtroCurso.value || null);
      } catch (e) {
        mostrarToast(t('inscricoes.erro_carregar') + ': ' + e.message, 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = t('inscricoes.modal.btn_salvar');
      }
    });

    function atualizarUISelecao() {
      const cbs = document.querySelectorAll('.participante-checkbox');
      const selecionados = document.querySelectorAll('.participante-checkbox:checked');
      const batchActions = document.getElementById('batchActions');
      const batchCount = document.getElementById('batchCount');
      const selectAll = document.getElementById('selecionarTodos');

      if (selecionados.length > 0) {
        batchActions.style.display = 'flex';
        batchCount.textContent = t('inscricoes.batch.selected').replace('{count}', selecionados.length);
      } else {
        batchActions.style.display = 'none';
      }

      if (selectAll) {
        selectAll.checked = cbs.length > 0 && selecionados.length === cbs.length;
      }
      
      cbs.forEach(cb => {
        cb.onchange = atualizarUISelecao;
      });
    }

    document.getElementById('selecionarTodos')?.addEventListener('change', (e) => {
      const isChecked = e.target.checked;
      document.querySelectorAll('.participante-checkbox').forEach(cb => {
        cb.checked = isChecked;
      });
      atualizarUISelecao();
    });

    document.getElementById('btnDeleteBatch')?.addEventListener('click', async () => {
      const selecionados = document.querySelectorAll('.participante-checkbox:checked');
      if (selecionados.length === 0) return;

      if (!confirm(t('inscricoes.batch.confirm').replace('{count}', selecionados.length))) return;

      const btn = document.getElementById('btnDeleteBatch');
      btn.disabled = true;
      btn.innerHTML = t('inscricoes.batch.excluindo');

      try {
        for (const cb of selecionados) {
          await participantesAPI.remover(cb.getAttribute('data-id'));
        }
        mostrarToast(t('inscricoes.sucesso_batch'));
        const filtroCurso = document.getElementById('filtroCurso');
        carregarParticipantes(filtroCurso.value || null);
      } catch (e) {
        mostrarToast(t('inscricoes.erro_carregar') + ': ' + e.message, 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i data-lucide="trash-2"></i> ' + t('inscricoes.batch.excluir_selecionados');
        lucide.createIcons();
      }
    });

    async function removerParticipante(id) {
      if (!confirm(t('inscricoes.confirm_excluir'))) return;

      try {
        await participantesAPI.remover(id);
        mostrarToast(t('inscricoes.sucesso_remover'));
        const filtroCurso = document.getElementById('filtroCurso');
        carregarParticipantes(filtroCurso.value || null);
      } catch (e) {
        mostrarToast(t('inscricoes.erro_carregar') + ': ' + e.message, 'error');
      }
    }

    // ==================== EXPORTAR EXCEL ====================
    function exportarExcel() {
      const btn = document.getElementById('btnExportar');
      const originalText = btn.innerHTML;

      try {
        btn.disabled = true;
        btn.innerHTML = t('inscricoes.filtro.gerando');

        const dados = participantesCache;
        if (dados.length === 0) {
          mostrarToast(t('inscricoes.sem_dados_exportar'), 'info');
          return;
        }

        // Monta as linhas da planilha
        const linhas = dados.map(p => {
          const curso = cursosCache.find(c => c.id === p.cursoId);
          const cursoNome = curso ? curso.nome : '-';

          // Formata a data de inscrição
          let dataFormatada = '-';
          if (p.dataInscricao) {
            const d = p.dataInscricao.toDate ? p.dataInscricao.toDate() : new Date(p.dataInscricao);
            if (!isNaN(d.getTime())) {
              const dia = String(d.getDate()).padStart(2, '0');
              const mes = String(d.getMonth() + 1).padStart(2, '0');
              const ano = d.getFullYear();
              const h = String(d.getHours()).padStart(2, '0');
              const min = String(d.getMinutes()).padStart(2, '0');
              dataFormatada = `${dia}/${mes}/${ano} ${h}:${min}`;
            }
          }

          return {
            [t('inscricoes.excel.nome_col')]: p.nome || '-',
            [t('inscricoes.excel.contato_col')]: p.contato || '-',
            [t('inscricoes.excel.curso_col')]: cursoNome,
            [t('inscricoes.excel.data_col')]: dataFormatada
          };
        });

        // Cria a planilha com SheetJS
        const ws = XLSX.utils.json_to_sheet(linhas);

        // Ajusta largura das colunas
        ws['!cols'] = [
          { wch: 40 },
          { wch: 30 },
          { wch: 30 },
          { wch: 22 },
        ];

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, t('inscricoes.excel.sheet_name'));

        // Nome do arquivo com data atual
        const hoje = new Date();
        const dataStr = `${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,'0')}-${String(hoje.getDate()).padStart(2,'0')}`;
        const nomeArquivo = t('inscricoes.excel.file_prefix') + dataStr + '.xlsx';

        // Gera o download
        XLSX.writeFile(wb, nomeArquivo);

        mostrarToast(t('inscricoes.excel.exportado').replace('{arquivo}', nomeArquivo), 'success');
      } catch (e) {
        mostrarToast(t('inscricoes.erro_exportar').replace('{msg}', e.message), 'error');
        console.error('Erro exportação:', e);
      } finally {
        btn.disabled = false;
        btn.innerHTML = originalText;
        if (typeof lucide !== 'undefined') lucide.createIcons();
      }
    }

    document.getElementById('formInscricao').addEventListener('submit', async (e) => {
      e.preventDefault();

      const nome = document.getElementById('nome').value.trim();
      const contato = document.getElementById('contato').value.trim();
      const cursosSelecionados = Array.from(document.querySelectorAll('input[name="curso"]:checked')).map(cb => cb.value);

      if (!nome || !contato || cursosSelecionados.length === 0) {
        mostrarToast(t('inscricoes.erro_validacao'), 'error');
        return;
      }

      const isEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(contato);
      const isPhone = /^(\(?\d{2}\)?\s?)?(\d{4,5}-?\d{4})$/.test(contato.replace(/\s/g, ''));
      
      if (!isEmail && !isPhone) {
        mostrarToast(t('inscricoes.erro_contato'), 'error');
        return;
      }

      const btnSubmit = document.getElementById('btnSubmit');
      btnSubmit.disabled = true;
      btnSubmit.textContent = t('inscricoes.form.inscrevendo');

      try {
        const inscritosAtuais = await participantesAPI.listar();
        let novos = 0;
        let pulados = 0;

        for (const cursoId of cursosSelecionados) {
          const jaExiste = inscritosAtuais.find(p => 
            p.cursoId === cursoId && 
            p.nome && nome && p.nome.toLowerCase().trim() === nome.toLowerCase().trim() &&
            p.contato && contato && p.contato.replace(/\D/g, '') === contato.replace(/\D/g, '')
          );

          if (!jaExiste) {
            await participantesAPI.adicionar({ nome, contato, cursoId });
            novos++;
          } else {
            pulados++;
          }
        }

        if (novos > 0) mostrarToast(t('inscricoes.sucesso_inscricao').replace('{novos}', novos));
        if (pulados > 0) mostrarToast(t('inscricoes.aviso_pulados').replace('{pulados}', pulados), 'info');

        document.getElementById('formInscricao').reset();
        carregarParticipantes(document.getElementById('filtroCurso').value || null);
      } catch (e) {
        mostrarToast(t('inscricoes.erro_carregar') + ': ' + e.message, 'error');
      } finally {
        btnSubmit.disabled = false;
        btnSubmit.innerHTML = t('inscricoes.form.btn_inscrever');
      }
    });

    document.getElementById('filtroCurso').addEventListener('change', (e) => {
      carregarParticipantes(e.target.value || null);
    });

    document.getElementById('menuToggle').addEventListener('click', () => {
      document.getElementById('navMenu').classList.toggle('aberto');
    });

    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      carregarCursos().then(() => {
        carregarParticipantes();
      });
    });
  </script>

</body>
</html>
