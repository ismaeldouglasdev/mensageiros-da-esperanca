<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="app.title">Presença - Mensageiros da Esperança</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <link rel="stylesheet" href="style.css?v=1.1">
  <style>
    .lang-switcher {
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 6px;
      padding: 0.25rem 0.5rem;
      font-size: 0.7rem;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: 0.5px;
      transition: all 0.2s;
      line-height: 1.4;
    }
    .lang-switcher:hover {
      background: rgba(255,255,255,0.3);
      border-color: #fff;
    }
  </style>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="i18n.js"></script>
  <script src="firebase.config.js?v=1.1"></script>
  <script src="firebase.js?v=1.1"></script>
  <script>protegerRota();</script>
</head>
<body>

  <header class="header">
    <div class="header-logo">
      <img src="logo.jpg" alt="Logo" onerror="this.src='https://via.placeholder.com/40/2E7D32/FFFFFF?text=ME'">
      <h1 data-i18n="app.name">Mensageiros da Esperança</h1>
    </div>
    <div style="display: flex; gap: 0.5rem; align-items: center;">
      <nav class="header-nav" id="navMenu">
        <a href="dashboard.html"><span data-i18n="nav.dashboard">Dashboard</span></a>
        <a href="cursos.html"><span data-i18n="nav.cursos">Cursos</span></a>
        <a href="inscricoes.html"><span data-i18n="nav.inscricoes">Inscrições</span></a>
        <a href="presenca.html" class="ativo"><span data-i18n="nav.presenca">Presença</span></a>
      </nav>
      <button class="lang-switcher" onclick="toggleLang()" title="Switch language" data-i18n-lang="lang.switch">PT</button>
      <button class="btn btn-sm" id="btnLogout" style="background: rgba(255,255,255,0.15); color: #fff;" data-i18n-title="nav.sair">
        <i data-lucide="log-out"></i>
      </button>
      <button class="menu-toggle" id="menuToggle" data-i18n-aria-label="nav.menu_abrir">
        <span>☰</span>
      </button>
    </div>
  </header>

  <main class="container">
    <h2 class="page-title"><i data-lucide="check-square"></i> <span data-i18n="presenca.title">Lista de Presença</span></h2>

    <div class="form-card">
      <h2 data-i18n="presenca.form.title">Selecionar Curso e Data</h2>
      <div class="form-row">
        <div class="form-group">
          <label for="cursoSelect" data-i18n="presenca.form.curso_label">Curso</label>
          <select id="cursoSelect">
            <option value="" data-i18n="presenca.form.curso_placeholder">Selecione um curso...</option>
          </select>
        </div>
        <div class="form-group">
          <label for="dataInput" data-i18n="presenca.form.data_label">Data da Aula</label>
          <input type="date" id="dataInput">
        </div>
      </div>
      <button class="btn btn-primary btn-block" id="carregarBtn"><i data-lucide="refresh-cw"></i> <span data-i18n="presenca.form.btn_carregar">Carregar Lista</span></button>
    </div>

    <div id="listaContainer" style="display: none;">
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th data-i18n="presenca.table.participante">Participante</th>
              <th style="display: flex; align-items: center; gap: 0.5rem;">
                <span data-i18n="presenca.table.presenca">Presença</span>
                <input type="checkbox" id="selecionarTodos" title="Selecionar todos" style="width: 18px; height: 18px; cursor: pointer;">
              </th>
            </tr>
          </thead>
          <tbody id="presencaTableBody"></tbody>
        </table>
      </div>

      <div style="margin-top: 1.5rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
        <div id="contadorPresenca" style="font-weight: 600; color: var(--primary-dark); font-size: 1.1rem;"></div>
        <button class="btn btn-primary" id="salvarBtn"><i data-lucide="save"></i> <span data-i18n="presenca.btn_salvar">Salvar Presenças</span></button>
      </div>
    </div>

    <div id="emptyState" class="empty-state">
      <i data-lucide="list-checks" class="icon"></i>
      <p data-i18n="presenca.empty_selecionar">Selecione um curso e uma data para carregar a lista de chamadas.</p>
    </div>

    <div id="loading" class="loading" style="display: none;">
      <div class="spinner"></div>
      <p data-i18n="presenca.loading">Carregando participantes...</p>
    </div>

    <div id="toast" class="toast" style="display: none;"></div>
  </main>

  <script>
    // Translate select options and placeholders
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      el.placeholder = t(el.getAttribute('data-i18n-placeholder'));
    });
    document.querySelectorAll('option[data-i18n]').forEach(el => {
      el.textContent = t(el.getAttribute('data-i18n'));
    });

    const btnLogout = document.getElementById('btnLogout');
    btnLogout?.addEventListener('click', async () => {
      if (confirm(t('dashboard.confirm_sair'))) {
        await authAPI.logout();
        window.location.href = 'login.html';
      }
    });

    let cursoAtualId = null;
    let dataAtual = null;
    let listaParticipantes = [];
    let presencasSalvas = [];

    function definirDataHoje() {
      const hoje = new Date().toISOString().split('T')[0];
      document.getElementById('dataInput').value = hoje;
    }

    function mostrarToast(msg, tipo = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = 'toast toast-' + tipo;
      toast.style.display = 'block';
      setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }

    async function carregarCursos() {
      try {
        const cursos = await cursosAPI.listar();
        const select = document.getElementById('cursoSelect');
        select.innerHTML = '<option value="">' + t('presenca.form.curso_placeholder') + '</option>';
        cursos.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c.id;
          const dataFmt = formatarDataBR(c.data);
          opt.textContent = c.nome + ' - ' + dataFmt;
          select.appendChild(opt);
        });
      } catch (e) {
        mostrarToast(t('presenca.erro_carregar'), 'error');
      }
    }

    function atualizarContador() {
      const checks = document.querySelectorAll('.presenca-checkbox');
      const total = checks.length;
      const presentes = document.querySelectorAll('.presenca-checkbox:checked').length;
      document.getElementById('contadorPresenca').innerHTML = '<i data-lucide="users" style="width:18px;vertical-align:middle"></i> ' + t('presenca.contador').replace('{presentes}', presentes).replace('{total}', total);
      lucide.createIcons();
    }

    function renderizarLista() {
      const tbody = document.getElementById('presencaTableBody');
      const selectAllCb = document.getElementById('selecionarTodos');
      tbody.innerHTML = '';
      if (selectAllCb) selectAllCb.checked = false;

      if (listaParticipantes.length === 0) {
        tbody.innerHTML = '<tr><td colspan="2" style="text-align:center; padding:3rem; color:var(--text-light);">' + t('presenca.empty_curso') + '</td></tr>';
        document.getElementById('contadorPresenca').textContent = '';
        return;
      }

      listaParticipantes.forEach(p => {
        const jaSalva = presencasSalvas.find(ps => ps.participanteId === p.id);
        const marcado = jaSalva ? jaSalva.presente : false;

        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${p.nome}</td>
          <td><input type="checkbox" class="presenca-checkbox" data-id="${p.id}" ${marcado ? 'checked' : ''}></td>`;
        tbody.appendChild(tr);
      });

      tbody.querySelectorAll('.presenca-checkbox').forEach(cb => {
        cb.addEventListener('change', () => {
          atualizarContador();
          // Desmarca o "Selecionar Todos" se algum for desmarcado manualmente
          if (!cb.checked && selectAllCb) selectAllCb.checked = false;
          // Marca o "Selecionar Todos" se todos forem marcados manualmente
          if (selectAllCb && document.querySelectorAll('.presenca-checkbox:checked').length === listaParticipantes.length) {
            selectAllCb.checked = true;
          }
        });
      });

      // Lógica do Selecionar Todos
      selectAllCb?.addEventListener('change', (e) => {
        const isChecked = e.target.checked;
        document.querySelectorAll('.presenca-checkbox').forEach(cb => {
          cb.checked = isChecked;
        });
        atualizarContador();
      });

      atualizarContador();
    }

    document.getElementById('carregarBtn').addEventListener('click', async function() {
      const cursoId = document.getElementById('cursoSelect').value;
      const data = document.getElementById('dataInput').value;

      if (!cursoId || !data) {
        mostrarToast(t('presenca.erro_selecao'), 'error');
        return;
      }

      cursoAtualId = cursoId;
      dataAtual = data;

      document.getElementById('loading').style.display = 'block';
      document.getElementById('listaContainer').style.display = 'none';
      document.getElementById('emptyState').style.display = 'none';

      try {
        listaParticipantes = await participantesAPI.listar(cursoId);
        presencasSalvas = await presencasAPI.listar(cursoId, data);
        renderizarLista();
        document.getElementById('listaContainer').style.display = 'block';
      } catch (e) {
        mostrarToast(t('presenca.erro_carregar'), 'error');
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    });

    document.getElementById('salvarBtn').addEventListener('click', async function() {
      if (!cursoAtualId || !dataAtual) return;

      const registros = [];
      document.querySelectorAll('.presenca-checkbox').forEach(cb => {
        const participante = listaParticipantes.find(p => p.id === cb.getAttribute('data-id'));
        if (participante) {
          registros.push({
            participanteId: participante.id,
            participanteNome: participante.nome,
            presente: cb.checked
          });
        }
      });

      const btn = document.getElementById('salvarBtn');
      btn.disabled = true;
      btn.textContent = t('presenca.salvando');

      try {
        await presencasAPI.salvarLista(cursoAtualId, dataAtual, registros);
        mostrarToast(t('presenca.sucesso_salvar'), 'success');
      } catch (e) {
        mostrarToast(t('presenca.erro_salvar'), 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i data-lucide="save"></i> ' + t('presenca.btn_salvar');
        lucide.createIcons();
      }
    });

    document.getElementById('menuToggle').addEventListener('click', function() {
      document.getElementById('navMenu').classList.toggle('aberto');
    });

    document.addEventListener('DOMContentLoaded', function() {
      lucide.createIcons();
      definirDataHoje();
      carregarCursos();
    });
  </script>

</body>
</html>
