<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="app.title">Cursos - Mensageiros da Esperança</title>
  <link rel="stylesheet" href="style.css?v=1.1">
  <style>
    .lang-switcher {
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 6px;
      padding: 0.25rem 0.5rem;
      font-size: 0.7rem;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: 0.5px;
      transition: all 0.2s;
      line-height: 1.4;
    }
    .lang-switcher:hover {
      background: rgba(255,255,255,0.3);
      border-color: #fff;
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="i18n.js"></script>
  <script src="firebase.config.js?v=1.1"></script>
  <script src="firebase.js?v=1.1"></script>
  <script>protegerRota();</script>
</head>
<body>

  <header class="header">
    <div class="header-logo">
      <img src="logo.jpg" alt="Logo" onerror="this.src='https://via.placeholder.com/40/2E7D32/FFFFFF?text=ME'">
      <h1 data-i18n="app.name">Mensageiros da Esperança</h1>
    </div>
    <div style="display: flex; gap: 0.5rem; align-items: center;">
      <nav class="header-nav" id="navMenu">
        <a href="dashboard.html"><span data-i18n="nav.dashboard">Dashboard</span></a>
        <a href="cursos.html" class="ativo"><span data-i18n="nav.cursos">Cursos</span></a>
        <a href="inscricoes.html"><span data-i18n="nav.inscricoes">Inscrições</span></a>
        <a href="presenca.html"><span data-i18n="nav.presenca">Presença</span></a>
      </nav>
      <button class="lang-switcher" onclick="toggleLang()" title="Switch language" data-i18n-lang="lang.switch">PT</button>
      <button class="btn btn-sm" id="btnLogout" style="background: rgba(255,255,255,0.15); color: #fff;" data-i18n-title="nav.sair">
        <i data-lucide="log-out"></i>
      </button>
      <button class="menu-toggle" id="menuToggle" data-i18n-aria-label="nav.menu_abrir">
        <span>☰</span>
      </button>
    </div>
  </header>

  <main class="container">
    <h2 class="page-title"><i data-lucide="book-marked"></i> <span data-i18n="cursos.title">Gestão de Cursos</span></h2>

    <div class="form-card">
      <h2 id="formTitle"><span data-i18n="cursos.form.title_new">Novo Curso</span></h2>
      <form id="formCurso">
        <input type="hidden" id="cursoId">
        <div class="form-group">
          <label for="nome" data-i18n="cursos.form.nome_label">Nome do Curso</label>
          <input type="text" id="nome" required data-i18n-placeholder="cursos.form.nome_placeholder" placeholder="Ex: Informática Básica">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="data" data-i18n="cursos.form.data_label">Data de Início/Evento</label>
            <input type="date" id="data" required>
          </div>
          <div class="form-group">
            <label for="horario" data-i18n="cursos.form.horario_label">Horário</label>
            <input type="time" id="horario" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="vagas" data-i18n="cursos.form.vagas_label">Vagas Disponíveis</label>
            <input type="number" id="vagas" min="1" required data-i18n-placeholder="cursos.form.vagas_placeholder" placeholder="Ex: 20">
          </div>
          <div class="form-group">
            <label for="responsavel" data-i18n="cursos.form.responsavel_label">Responsável/Instrutor</label>
            <input type="text" id="responsavel" required data-i18n-placeholder="cursos.form.responsavel_placeholder" placeholder="Nome do instrutor">
          </div>
        </div>
        <div class="form-group">
          <label for="unidade" data-i18n="cursos.form.unidade_label">Unidade</label>
          <select id="unidade" required>
            <option value="" data-i18n="cursos.form.unidade_placeholder">Selecione a unidade...</option>
            <option value="Unidade 1" data-i18n="cursos.form.unidade1">Unidade 1 - Central</option>
            <option value="Unidade 2" data-i18n="cursos.form.unidade2">Unidade 2 - Praça</option>
            <option value="Unidade 3" data-i18n="cursos.form.unidade3">Unidade 3 - Casa de Cultura</option>
          </select>
        </div>
        <div class="form-row">
          <button type="submit" class="btn btn-primary btn-block" id="btnSubmit">
            <i data-lucide="plus-circle"></i> <span data-i18n="cursos.form.btn_cadastrar">Cadastrar Curso</span>
          </button>
          <button type="button" class="btn btn-secondary btn-block" id="btnCancelar" style="display: none;">
            <span data-i18n="cursos.form.btn_cancelar">Cancelar Edição</span>
          </button>
        </div>
      </form>
    </div>

    <h2 class="page-title"><i data-lucide="list"></i> <span data-i18n="cursos.lista_title">Cursos Cadastrados</span></h2>

    <div class="table-container">
      <table id="tabelaCursos">
        <thead>
          <tr>
            <th data-i18n="cursos.table.nome">Nome</th>
            <th data-i18n="cursos.table.data">Data</th>
            <th data-i18n="cursos.table.horario">Horário</th>
            <th data-i18n="cursos.table.vagas">Vagas</th>
            <th data-i18n="cursos.table.responsavel">Responsável</th>
            <th data-i18n="cursos.table.unidade">Unidade</th>
            <th data-i18n="cursos.table.acoes">Ações</th>
          </tr>
        </thead>
        <tbody id="listaCursos">
          <tr>
            <td colspan="7" class="loading">
              <div class="spinner"></div>
              <p data-i18n="cursos.loading">Carregando cursos...</p>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div id="toast" class="toast" style="display: none;"></div>
  </main>

  <script>
    const formCurso = document.getElementById('formCurso');
    const listaCursos = document.getElementById('listaCursos');
    const menuToggle = document.getElementById('menuToggle');
    const navMenu = document.getElementById('navMenu');
    const btnSubmit = document.getElementById('btnSubmit');
    const btnCancelar = document.getElementById('btnCancelar');
    const formTitle = document.getElementById('formTitle');
    const cursoIdInput = document.getElementById('cursoId');
    const btnLogout = document.getElementById('btnLogout');

    // Translate placeholders
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      el.placeholder = t(el.getAttribute('data-i18n-placeholder'));
    });
    // Translate select options with data-i18n
    document.querySelectorAll('option[data-i18n]').forEach(el => {
      el.textContent = t(el.getAttribute('data-i18n'));
    });

    btnLogout?.addEventListener('click', async () => {
      if (confirm(t('dashboard.confirm_sair'))) {
        await authAPI.logout();
        window.location.href = 'login.html';
      }
    });

    let editando = false;

    menuToggle.addEventListener('click', () => {
      navMenu.classList.toggle('aberto');
    });

    function mostrarToast(msg, tipo = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = `toast toast-${tipo}`;
      toast.style.display = 'block';
      setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }

    async function carregarCursos() {
      listaCursos.innerHTML = `
        <tr>
          <td colspan="7" class="loading">
            <div class="spinner"></div>
            <p>${t('cursos.loading')}</p>
          </td>
        </tr>
      `;
      try {
        const cursos = await cursosAPI.listar();
        if (cursos.length === 0) {
          listaCursos.innerHTML = `
            <tr>
              <td colspan="7" class="empty-state">
                <i data-lucide="folder-open" class="icon"></i>
                <p>${t('cursos.empty')}</p>
              </td>
            </tr>
          `;
          lucide.createIcons();
          return;
        }
        listaCursos.innerHTML = cursos.map(c => `
          <tr>
            <td><strong>${c.nome || '-'}</strong></td>
            <td>${formatarDataBR(c.data)}</td>
            <td>${formatarHoraBR(c.horario)}</td>
            <td>${c.vagas || 0}</td>
            <td>${c.responsavel || '-'}</td>
            <td><span class="badge badge-primary">${c.unidade || '-'}</span></td>
            <td>
              <div style="display: flex; gap: 0.5rem;">
                <button class="btn btn-secondary btn-sm" onclick="prepararEdicao('${c.id}')" title="${t('common.editar')}">
                  <i data-lucide="edit-3"></i>
                </button>
                <button class="btn btn-danger btn-sm" onclick="excluirCurso('${c.id}', '${c.nome}')" title="${t('common.excluir')}">
                  <i data-lucide="trash-2"></i>
                </button>
              </div>
            </td>
          </tr>
        `).join('');
        lucide.createIcons();
      } catch (err) {
        console.error('Erro detalhado ao carregar cursos:', err);
        listaCursos.innerHTML = `
          <tr>
            <td colspan="7" class="loading" style="color: var(--danger)">
              ${t('cursos.erro_carregar')}
            </td>
          </tr>
        `;
        mostrarToast(t('cursos.erro_carregar'), 'error');
      }
    }

    async function prepararEdicao(id) {
      try {
        const curso = await cursosAPI.obter(id);
        if (!curso) return;

        cursoIdInput.value = curso.id;
        document.getElementById('nome').value = curso.nome;
        document.getElementById('data').value = curso.data;
        document.getElementById('horario').value = curso.horario;
        document.getElementById('vagas').value = curso.vagas;
        document.getElementById('responsavel').value = curso.responsavel;
        document.getElementById('unidade').value = curso.unidade;

        editando = true;
        formTitle.innerHTML = '<span data-i18n="cursos.form.title_edit">' + t('cursos.form.title_edit') + '</span>';
        applyTranslations();
        btnSubmit.innerHTML = '<i data-lucide="save"></i> ' + t('cursos.form.btn_salvar');
        btnCancelar.style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
        lucide.createIcons();
      } catch (err) {
        mostrarToast(t('cursos.erro_obter'), 'error');
      }
    }

    btnCancelar.addEventListener('click', () => {
      formCurso.reset();
      cursoIdInput.value = '';
      editando = false;
      formTitle.innerHTML = '<span data-i18n="cursos.form.title_new">' + t('cursos.form.title_new') + '</span>';
      applyTranslations();
      btnSubmit.innerHTML = '<i data-lucide="plus-circle"></i> ' + t('cursos.form.btn_cadastrar');
      btnCancelar.style.display = 'none';
      lucide.createIcons();
    });

    async function excluirCurso(id, nome) {
      try {
        // Proteção de exclusão: verificar se há participantes
        const participantes = await participantesAPI.listar(id);
        if (participantes.length > 0) {
          mostrarToast(t('cursos.erro_excluir_com_participantes').replace('{nome}', nome).replace('{count}', participantes.length), 'error');
          return;
        }

        if (!confirm(t('cursos.confirm_excluir').replace('{nome}', nome))) return;
        
        // Limpar presenças órfãs antes de deletar o curso
        await presencasUtilsAPI.removerPorCurso(id);
        
        await cursosAPI.remover(id);
        mostrarToast(t('cursos.sucesso_excluir'), 'success');
        carregarCursos();
      } catch (err) {
        console.error('Erro ao excluir curso:', err);
        mostrarToast(t('cursos.erro_salvar'), 'error');
      }
    }

    formCurso.addEventListener('submit', async (e) => {
      e.preventDefault();
      const curso = {
        nome: document.getElementById('nome').value.trim(),
        data: document.getElementById('data').value,
        horario: document.getElementById('horario').value,
        vagas: parseInt(document.getElementById('vagas').value),
        responsavel: document.getElementById('responsavel').value.trim(),
        unidade: document.getElementById('unidade').value
      };

      btnSubmit.disabled = true;

      try {
        if (editando) {
          await cursosAPI.atualizar(cursoIdInput.value, curso);
          mostrarToast(t('cursos.sucesso_atualizar'), 'success');
          btnCancelar.click();
        } else {
          await cursosAPI.adicionar(curso);
          mostrarToast(t('cursos.sucesso_salvar'), 'success');
          formCurso.reset();
        }
        carregarCursos();
      } catch (err) {
        mostrarToast(t('cursos.erro_salvar'), 'error');
      } finally {
        btnSubmit.disabled = false;
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      carregarCursos();
    });
  </script>

</body>
</html>
